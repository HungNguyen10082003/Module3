<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Gallery Bootstrap</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f1f1f1;
        font-family: Arial, sans-serif;
      }

      .gallery-title {
        margin-top: 30px;
        margin-bottom: 20px;
      }

      .gallery-item {
        border: 1px solid #ccc;
        background-color: #fff;
        margin-bottom: 20px;
      }

      .gallery-item img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        display: block;
      }

      .gallery-desc {
        text-align: center;
        padding: 15px 10px;
        font-size: 16px;
      }

      .note {
        margin-top: 10px;
        font-size: 16px;
      }

      .custom-col {
        width: 25%;
      }

      @media screen and (max-width: 700px) {
        .custom-col {
          width: 50%;
        }
      }

      @media screen and (max-width: 500px) {
        .custom-col {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="container py-4">
      <h1 class="gallery-title">Responsive Image Gallery</h1>
      <h3 class="mb-4">Resize the browser window to see the effect.</h3>

      <div class="row">
        <div class="custom-col">
          <div class="gallery-item">
            <img src="https://picsum.photos/id/1015/600/400" alt="Image 1" />
            <div class="gallery-desc">Add a description of the image here</div>
          </div>
        </div>

        <div class="custom-col">
          <div class="gallery-item">
            <img src="https://picsum.photos/id/1011/600/400" alt="Image 2" />
            <div class="gallery-desc">Add a description of the image here</div>
          </div>
        </div>

        <div class="custom-col">
          <div class="gallery-item">
            <img src="https://picsum.photos/id/1016/600/400" alt="Image 3" />
            <div class="gallery-desc">Add a description of the image here</div>
          </div>
        </div>

        <div class="custom-col">
          <div class="gallery-item">
            <img src="https://picsum.photos/id/1018/600/400" alt="Image 4" />
            <div class="gallery-desc">Add a description of the image here</div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
