<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Form sản phẩm</title>
</head>
<body>
<h1 th:text="${product.id} == 0 ? 'Tạo sản phẩm' : 'Sửa sản phẩm'"></h1>

<form th:action="${product.id} == 0 ? @{/products/create} : @{/products/edit}" method="post">
    <input type="hidden" name="id" th:value="${product.id}" />
    <div>
        <label>Tên:</label>
        <input type="text" name="name" th:value="${product.name}" />
    </div>
    <div>
        <label>Giá:</label>
        <input type="number" step="0.01" name="price" th:value="${product.price}" />
    </div>
    <div>
        <label>Nhà sản xuất:</label>
        <input type="text" name="manufacturer" th:value="${product.manufacturer}" />
    </div>
    <div>
        <label>Mô tả:</label>
        <textarea name="description" th:text="${product.description}"></textarea>
    </div>
    <div>
        <button type="submit">Lưu</button>
        <a th:href="@{/products}">Hủy</a>
    </div>
</form>

</body>
</html>
