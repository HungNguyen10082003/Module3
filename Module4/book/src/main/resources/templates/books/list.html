<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sách</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
        }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .book-card {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .book-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.3em;
        }
        .book-card p {
            color: #666;
            margin: 8px 0;
            font-size: 0.95em;
        }
        .quantity {
            font-weight: bold;
            color: #333;
            font-size: 1.1em;
        }
        .quantity.available {
            color: #28a745;
        }
        .quantity.unavailable {
            color: #dc3545;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 15px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
            border: none;
            cursor: pointer;
            font-size: 0.95em;
        }
        .btn:hover {
            background: #764ba2;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #dee2e6;
            color: #666;
        }
        .nav-bar {
            text-align: center;
            margin-bottom: 20px;
        }
        .nav-bar a {
            padding: 10px 20px;
            margin: 0 5px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .nav-bar a:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Thư viện sách</h1>
        
        <div class="nav-bar">
            <a href="/books/return-page">Trả sách</a>
        </div>
        
        <div class="book-grid">
            <div th:each="book : ${books}" class="book-card">
                <h3 th:text="${book.title}">Tên sách</h3>
                <p><strong>Tác giả:</strong> <span th:text="${book.author}">Tên tác giả</span></p>
                <p><strong>Số lượng còn lại:</strong> 
                    <span class="quantity" 
                          th:classappend="${book.quantity > 0 ? 'available' : 'unavailable'}"
                          th:text="${book.quantity}">5</span>
                </p>
                <form th:action="@{/books/{id}(id=${book.id})}" method="GET">
                    <button type="submit" class="btn">Xem chi tiết</button>
                </form>
            </div>
        </div>
        
        <div class="footer">
            <p>Chọn một cuốn sách để xem chi tiết và mượn sách.</p>
        </div>
    </div>
</body>
</html>
