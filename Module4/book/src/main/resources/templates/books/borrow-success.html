<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mượn sách thành công</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 10px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
        }
        h1 {
            color: #28a745;
            margin-bottom: 20px;
            font-size: 2em;
        }
        .message {
            font-size: 1.2em;
            color: #333;
            margin: 20px 0;
            line-height: 1.6;
        }
        .code-box {
            background: #f8f9fa;
            border: 3px solid #28a745;
            border-radius: 8px;
            padding: 30px;
            margin: 30px 0;
        }
        .code-label {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .borrow-code {
            font-size: 3em;
            font-weight: bold;
            color: #28a745;
            font-family: 'Courier New', monospace;
            letter-spacing: 5px;
        }
        .book-info {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: left;
        }
        .book-info p {
            margin: 10px 0;
            font-size: 1.05em;
            color: #333;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: #28a745;
            color: white;
        }
        .btn-primary:hover {
            background: #218838;
            transform: scale(1.05);
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #5a6268;
            transform: scale(1.05);
        }
        .warning-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mượn sách thành công</h1>
        
        <div class="message">
            Bạn đã mượn sách thành công. Hãy lưu lại mã mượn để trả sách sau này.
        </div>
        
        <div class="code-box">
            <div class="code-label">Mã mượn của bạn</div>
            <div class="borrow-code" th:text="${borrowCode}">12345</div>
        </div>
        
        <div class="book-info">
            <p><strong>Tên sách:</strong> <span th:text="${book.title}">Tên sách</span></p>
            <p><strong>Tác giả:</strong> <span th:text="${book.author}">Tên tác giả</span></p>
            <p><strong>Số lượng còn lại:</strong> <span th:text="${book.quantity}">4</span></p>
        </div>
        
        <div class="warning-box">
            Hãy lưu lại mã này để dùng khi trả sách.
        </div>
        
        <div class="btn-group">
            <a href="/books" class="btn btn-primary">Quay lại danh sách</a>
            <a href="/books/return-page" class="btn btn-secondary">Đi đến trang trả sách</a>
        </div>
    </div>
</body>
</html>
