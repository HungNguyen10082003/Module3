<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title th:text="${blog.id} == null ? 'Create Blog' : 'Edit Blog'">Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">My Blog</a>
    </div>
</nav>

<main class="container container-main">
    <div class="py-3">
        <h1 th:text="${blog.id} == null ? 'Create Blog' : 'Edit Blog'"></h1>
        <form th:action="${blog.id} == null ? @{/blogs} : @{/blogs/{id}/edit(id=${blog.id})}" method="post">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input class="form-control" type="text" name="title" th:value="${blog.title}" />
            </div>
            <div class="mb-3">
                <label class="form-label">Content</label>
                <textarea class="form-control" name="content" rows="10" th:text="${blog.content}"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Category</label>
                <select class="form-select" name="categoryId">
                    <option th:value="''" th:text="'-- None --'" th:selected="${blog.category} == null"></option>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                            th:selected="${blog.category != null and c.id == blog.category.id}"></option>
                </select>
            </div>
            <div>
                <button class="btn btn-primary" type="submit">Save</button>
                <a class="btn btn-outline-secondary ms-2" th:href="@{/blogs}">Cancel</a>
            </div>
        </form>
    </div>
    <footer class="footer text-center mt-5">
        <small>© <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}"></span> My Blog</small>
    </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
