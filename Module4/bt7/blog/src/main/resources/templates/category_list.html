<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">My Blog</a>
    </div>
</nav>

<main class="container container-main">
    <div class="py-3 d-flex justify-content-between align-items-center">
        <h1 class="h4">Categories</h1>
        <a class="btn btn-success" th:href="@{/categories/new}">Create Category</a>
    </div>
    <ul class="list-group">
        <li class="list-group-item d-flex justify-content-between align-items-center" th:each="c : ${categories}">
            <span th:text="${c.name}">Name</span>
            <div>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/categories/{id}/edit(id=${c.id})}">Edit</a>
                <form th:action="@{/categories/{id}/delete(id=${c.id})}" method="post" style="display:inline">
                    <button class="btn btn-sm btn-danger ms-1" type="submit">Delete</button>
                </form>
            </div>
        </li>
    </ul>
    <div class="mt-3">
        <a class="btn btn-outline-primary" th:href="@{/blogs}">Back to Blogs</a>
    </div>

    <footer class="footer text-center mt-5">
        <small>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span> My Blog</small>
    </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
