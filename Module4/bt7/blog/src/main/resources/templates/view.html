<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title th:text="${blog.title}">Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">My Blog</a>
    </div>
</nav>

<main class="container container-main">
    <article class="mt-4">
        <h1 th:text="${blog.title}">Title</h1>
        <div class="mb-2">
            <span class="category-badge" th:if="${blog.category != null}" th:text="${blog.category.name}"></span>
            <small class="text-muted ms-2">Created: <span th:text="${#dates.format(blog.createdAt, 'dd MMM yyyy HH:mm')}"></span></small>
        </div>
        <div class="lead" th:utext="${blog.content}"></div>
        <div class="mt-4">
            <a class="btn btn-outline-secondary" th:href="@{/blogs}">Back</a>
            <a class="btn btn-primary ms-2" th:href="@{/blogs/{id}/edit(id=${blog.id})}">Edit</a>
        </div>
    </article>

    <footer class="footer text-center mt-5">
        <small>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span> My Blog</small>
    </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
