<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Blogs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css" />
    <style> a { text-decoration: none; } </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">My Blog</a>
        <div class="collapse navbar-collapse show">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/blogs}">Blogs</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/categories}">Categories</a></li>
            </ul>
            <form class="d-flex" th:action="@{/blogs}" method="get">
                <input class="form-control me-2" type="search" name="q" placeholder="Search" th:value="${q}" />
                <input type="hidden" name="category" th:if="${categoryFilter != null}" th:value="${categoryFilter}" />
                <button class="btn btn-light" type="submit">Search</button>
            </form>
        </div>
    </div>
</nav>

<main class="container container-main">
    <div class="d-flex justify-content-between align-items-center site-header">
        <h1 class="h3">Blog List</h1>
        <div>
            <a class="btn btn-success" th:href="@{/blogs/new}">Create New</a>
            <a class="btn btn-outline-secondary ms-2" th:href="@{/categories}">Manage Categories</a>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-12">
            <div class="row row-cols-1 row-cols-md-2 g-3">
                <div class="col" th:each="b : ${blogs}">
                    <div class="card blog-card h-100">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <h5 class="card-title"><a th:href="@{/blogs/{id}(id=${b.id})}" th:text="${b.title}">Title</a></h5>
                                <small class="text-muted" th:text="${#temporals.format(b.createdAt, 'dd MMM yyyy')}"></small>
                            </div>
                            <p class="card-text blog-excerpt" th:text="${b.content}"></p>
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <span th:if="${b.category != null}" class="category-badge" th:text="${b.category.name}"></span>
                                </div>
                                <div>
                                    <a class="btn btn-sm btn-primary" th:href="@{/blogs/{id}(id=${b.id})}">View</a>
                                    <a class="btn btn-sm btn-outline-secondary ms-1" th:href="@{/blogs/{id}/edit(id=${b.id})}">Edit</a>
                                    <form th:action="@{/blogs/{id}/delete(id=${b.id})}" method="post" style="display:inline">
                                        <button class="btn btn-sm btn-danger ms-1" type="submit">Delete</button>
                                    </form>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav aria-label="Page navigation" class="mt-4" th:if="${page.totalPages > 1}">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:if="${page.hasPrevious()}">
                <a class="page-link" th:href="@{/blogs(page=${page.number - 1}, q=${q}, category=${categoryFilter})}">Previous</a>
            </li>
            <li class="page-item disabled" th:if="${!page.hasPrevious()}">
                <span class="page-link">Previous</span>
            </li>

            <li class="page-item" th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}" th:classappend="${i} == ${page.number} ? ' active' : ''">
                <a class="page-link" th:href="@{/blogs(page=${i}, q=${q}, category=${categoryFilter})}" th:text="${i + 1}"></a>
            </li>

            <li class="page-item" th:if="${page.hasNext()}">
                <a class="page-link" th:href="@{/blogs(page=${page.number + 1}, q=${q}, category=${categoryFilter})}">Next</a>
            </li>
            <li class="page-item disabled" th:if="${!page.hasNext()}">
                <span class="page-link">Next</span>
            </li>
        </ul>
    </nav>

    <footer class="footer text-center mt-5">
        <small>© <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy')}"></span> My Blog</small>
    </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
