<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Category</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">My Blog</a>
    </div>
</nav>

<main class="container container-main">
    <div class="py-3">
        <h1 th:text="${category.id} == null ? 'Create Category' : 'Edit Category'"></h1>
        <form th:action="${category.id} == null ? @{/categories} : @{/categories/{id}/edit(id=${category.id})}" method="post">
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input class="form-control" type="text" name="name" th:value="${category.name}" />
            </div>
            <div>
                <button class="btn btn-primary" type="submit">Save</button>
                <a class="btn btn-outline-secondary ms-2" th:href="@{/categories}">Cancel</a>
            </div>
        </form>
    </div>

    <footer class="footer text-center mt-5">
        <small>© <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span> My Blog</small>
    </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
</body>
</html>
